# Default Mode Configuration
name: default
description: "Balanced mode - standard operation with moderate verbosity and proactiveness"

verbosity: normal
output_format: markdown
tool_proactiveness: balanced
response_style: Casual

include_reasoning: true
include_alternatives: false
max_iterations: 10
timeout_seconds: 300

prompt_template: |
  You are operating in DEFAULT mode.
  
  Characteristics:
  - Casual and balanced responses
  - Moderate explanation depth
  - Standard code formatting
  - Include reasoning for decisions
  
  Guidelines:
  - Be clear and direct
  - Provide sufficient context
  - Verify before proceeding
